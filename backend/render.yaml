services:
  - type: web
    name: femfin-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://femfin.app
      - key: AI_PROVIDER
        value: auto
      - key: XAI_MODEL
        value: grok-2-latest
      - key: AI_TIMEOUT_MS
        value: 120000
      - key: XAI_API_KEY
        sync: false
      - key: AUTH_RATE_LIMIT_WINDOW
        value: 15
      - key: AUTH_RATE_LIMIT_MAX
        value: 20
