<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes"
    />
    <meta name="theme-color" content="#9c27b0" />
    <meta
      name="description"
      content="FemFin AI - Empowering Women Entrepreneurs with AI-powered funding solutions"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>FemFin AI - Women Entrepreneur Funding Platform</title>
    <script>
      // Handle GitHub Pages SPA fallback redirect from 404.html.
      (function () {
        var redirect = sessionStorage.getItem("spa-redirect");
        if (redirect) {
          sessionStorage.removeItem("spa-redirect");
          window.history.replaceState(null, null, redirect);
        }
      })();
    </script>
    <style>
      body {
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
